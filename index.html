<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>

  <!-- DNS Prefetch & Preconnect for faster Firebase/Google API handshakes -->
  <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Primary Meta Tags -->
  <meta name="title" content="%VITE_OG_TITLE%">
  <meta name="description"
    content="Book your perfect getaway directly with us for the best rates and exclusive availability.">

  <!-- Open Graph / Facebook / Messenger -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="%VITE_OG_URL%">
  <meta property="og:title" id="og-title" content="%VITE_OG_TITLE%">
  <meta property="og:description" id="og-description" content="%VITE_OG_DESCRIPTION%">
  <!-- IMPORTANT: For the image preview to work, this URL must be an absolute path to a publicly accessible image -->
  <meta property="og:image" id="og-image" content="%VITE_OG_IMAGE%">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="%VITE_OG_URL%">
  <meta property="twitter:title" content="%VITE_OG_TITLE%">
  <meta property="twitter:description" content="%VITE_OG_DESCRIPTION%">
  <meta property="twitter:image" content="%VITE_OG_IMAGE%">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Polyfill process for browser environment to prevent crash
    window.process = { env: { API_KEY: '' } };
  </script>
  <style>
    :root {
      --color-primary: #2A9D8F;
      --color-primary-hover: #21867a;
      --color-secondary: #264653;
      --color-accent: #E9C46A;
    }
  </style>
  <script>
    // Instantly apply cached theme colors before React loads
    (function () {
      try {
        var p = localStorage.getItem('theme-primary');
        var ph = localStorage.getItem('theme-primary-hover');
        var s = localStorage.getItem('theme-secondary');
        var a = localStorage.getItem('theme-accent');
        if (p) document.documentElement.style.setProperty('--color-primary', p);
        if (ph) document.documentElement.style.setProperty('--color-primary-hover', ph);
        if (s) document.documentElement.style.setProperty('--color-secondary', s);
        if (a) document.documentElement.style.setProperty('--color-accent', a);
      } catch (e) { }
    })();
  </script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: 'var(--color-primary)',
            'primary-hover': 'var(--color-primary-hover)',
            secondary: 'var(--color-secondary)',
            accent: 'var(--color-accent)',
            surface: '#F4F1DE',
            text: '#333333'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif']
          },
          animation: {
            'fade-in-up': 'fadeInUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
            'fade-in': 'fadeIn 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
            'slide-in-left': 'slideInLeft 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
            'slide-in-right': 'slideInRight 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
            'pop': 'pop 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'slide-down': 'slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(40px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideInLeft: {
              '0%': { opacity: '0', transform: 'translateX(-40px)' },
              '100%': { opacity: '1', transform: 'translateX(0)' },
            },
            slideInRight: {
              '0%': { opacity: '0', transform: 'translateX(40px)' },
              '100%': { opacity: '1', transform: 'translateX(0)' },
            },
            pop: {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            slideDown: {
              '0%': { opacity: '0', transform: 'translateY(-10px)', maxHeight: '0' },
              '100%': { opacity: '1', transform: 'translateY(0)', maxHeight: '500px' },
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Hide scrollbar globally for Chrome, Safari and Opera */
    ::-webkit-scrollbar {
      display: none;
    }

    /* Hide scrollbar globally for IE, Edge and Firefox */
    html,
    body,
    * {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }
  </style>
  <!-- Non-render-blocking Google Fonts (swap instead of blocking the page) -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"></noscript>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.4.1",
    "date-fns": "https://aistudiocdn.com/date-fns@^4.1.0"
  }
}
</script>
</head>

<body
  class="bg-surface dark:bg-gray-900 text-text dark:text-gray-100 antialiased scroll-smooth selection:bg-primary selection:text-white transition-colors duration-300">
  <script src="/firebase-config.js"></script>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
