# Netlify Configuration

[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

# Redirect API calls to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Fallback for Single Page Application (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
